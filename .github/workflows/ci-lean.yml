# ============================================================
# .github/workflows/ci-lean.yml (Continuous Integration)
# ============================================================
# WHY-FILE: Lean deliverables are proofs; broken proofs must not merge.
# REQ: Any check that can be run locally MUST be available locally via pre-commit.
# REQ: CI MUST NOT introduce arbitrary rules that are not reproducible locally.

name: CI Lean

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lean:
    name: Build Lean and export contract
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ============================================================
      # A) ASSEMBLE: Get code and set up Lean
      # ============================================================

      - name: A1) Checkout repository code
        uses: actions/checkout@v6

      - name: A2) Set up Lean toolchain
        uses: leanprover/lean-action@v1

      # ============================================================
      # B) BUILD: Compile Lean project
      # ============================================================

      - name: B1) Build Lean project
        run: lake build
        # WHY: Compiles the Lean formal contract surface.
        # OBS: Uses the Lean version declared in lean-toolchain.

      # ============================================================
      # C) EXPORT: Generate contract artifacts
      # ============================================================

      - name: C1) Export formal contract artifacts
        run: lake exe export_contract
        # WHY: Generates data/contract/*.json from the Lean surface.
        # OBS: This command writes generated artifacts for downstream consumption.
