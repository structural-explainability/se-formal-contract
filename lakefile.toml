name = "SEFormalContract"
version = "0.2.0"
license = "MIT"

keywords = [
  "structural-explainability",
  "formal-contract",
  "neutrality",
  "identity-regimes",
  "invariants",
  "formal-specification",
  "formal-verification",
  "proof-carrying",
  "theorem-proving",
  "lean4",
]

# ============================================================
# Build configuration
# ============================================================

defaultTargets = ["SEFormalContract"]

# ============================================================
# Libraries provided by this package
# ============================================================

[[lean_lib]]
name = "SEFormalContract"

# ============================================================
# Executables
# ============================================================

[[lean_exe]]
name = "export_contract"
root = "Main"
