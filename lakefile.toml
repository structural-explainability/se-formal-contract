# ============================================================
# lakefile.toml
# ============================================================

# REQ.FILE.PROJECT.IDENTITY
#   Declares the externally visible identity and build surface of this package.
#   Sections marked CUSTOM are expected to vary by repository.

# ============================================================
# REQUIRED PROJECT IDENTITY
# ============================================================

name = "SEFormalContract"
version = "0.2.0"
license = "MIT"

keywords = [
  "structural-explainability",
  "formal-contract",
  "neutrality",
  "identity-regimes",
  "invariants",
  "formal-specification",
  "formal-verification",
  "proof-carrying",
  "theorem-proving",
  "lean4",
]

# === BUILD CONFIGURATION

defaultTargets = ["SEFormalContract"]

# === EXPORT LIBRARY (public, exported)
# Lake discovers all modules under SEFormalContract/ automatically.
# Dependency order: Vocab → Neutrality / RegimeProfile / Relation → Theorems → Export → Surface


# === EXPORT LIBRARY (public, exported)

[[lean_lib]]
name = "SEFormalContract"

# === Executables

[[lean_exe]]
name = "export_contract"
root = "Main"

# === TEST LIBRARIES (internal, not exported)

[[lean_lib]]
name = "TestImport"
srcDir = "test"

[[lean_lib]]
name = "TestExport"
srcDir = "test"
